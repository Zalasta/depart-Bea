<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Compte à Rebours de Béa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose:       #e8a0bf;
            --rose-light: #f5d5e0;
            --rose-pale:  #fdf2f7;
            --lavande:    #c3aed6;
            --lavande-light: #e0d4f0;
            --sauge:      #a8c5a0;
            --sauge-light:#d4e6cf;
            --creme:      #fefaf6;
            --warm-white: #fffcf9;
            --text-dark:  #4a3f4b;
            --text-soft:  #7a6b7d;
            --text-light: #a89aab;
            --gold:       #d4a96a;
            --gold-light: #f0dfc0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Lora', Georgia, serif;
            background-color: var(--creme);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ══════════════════════════════════════════
           SPLASH SCREEN — animation d'accueil
           ══════════════════════════════════════════ */
        .splash-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--creme) 0%, var(--rose-pale) 40%, var(--lavande-light) 100%);
            opacity: 1;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            cursor: pointer;
        }

        .splash-overlay.fade-out {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .splash-flower {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: splashBloom 1.2s ease-out both;
        }

        .splash-greeting {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            color: var(--rose);
            margin-bottom: 8px;
            animation: splashFadeUp 1s ease-out 0.3s both;
        }

        .splash-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2.2rem, 7vw, 3.8rem);
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
            animation: splashFadeUp 1s ease-out 0.5s both;
            text-align: center;
            padding: 0 20px;
        }

        .splash-date {
            font-family: 'Lora', serif;
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: var(--text-soft);
            margin-bottom: 6px;
            animation: splashFadeUp 1s ease-out 0.7s both;
        }

        .splash-saint {
            font-family: 'Lora', serif;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: var(--lavande);
            font-style: italic;
            margin-bottom: 32px;
            animation: splashFadeUp 1s ease-out 0.85s both;
            text-align: center;
            padding: 0 20px;
        }

        .splash-cta {
            font-family: 'Dancing Script', cursive;
            font-size: 1.15rem;
            color: var(--text-light);
            animation: splashPulse 2s ease-in-out 1.5s infinite both;
            letter-spacing: 0.5px;
        }

        .splash-petals {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .splash-petal-item {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0;
            animation: splashPetalDrift 4s ease-in-out forwards;
        }

        @keyframes splashBloom {
            0%   { opacity: 0; transform: scale(0.3) rotate(-30deg); }
            60%  { transform: scale(1.15) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes splashFadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes splashPulse {
            0%, 100% { opacity: 0.5; }
            50%      { opacity: 1; }
        }
        @keyframes splashPetalDrift {
            0%   { opacity: 0; transform: translateY(-30px) rotate(0deg) scale(0.8); }
            15%  { opacity: 0.6; }
            85%  { opacity: 0.4; }
            100% { opacity: 0; transform: translateY(calc(100vh + 30px)) rotate(270deg) scale(0.5); }
        }

        /* ══════════════════════════════════════════
           BACKGROUND BLOBS
           ══════════════════════════════════════════ */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: floatBlob 20s ease-in-out infinite alternate;
        }

        .blob-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--rose-light), transparent 70%);
            top: -10%; left: -5%;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--lavande-light), transparent 70%);
            top: 30%; right: -8%;
            animation-delay: -5s;
        }
        .blob-3 {
            width: 450px; height: 450px;
            background: radial-gradient(circle, var(--sauge-light), transparent 70%);
            bottom: -5%; left: 20%;
            animation-delay: -10s;
        }
        .blob-4 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, var(--gold-light), transparent 70%);
            top: 60%; left: -10%;
            animation-delay: -15s;
        }

        @keyframes floatBlob {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(30px, -20px) scale(1.05); }
            66%  { transform: translate(-20px, 30px) scale(0.95); }
            100% { transform: translate(15px, 15px) scale(1.02); }
        }

        /* ══════════════════════════════════════════
           FLORAL SVG CORNERS
           ══════════════════════════════════════════ */
        .floral-top-right, .floral-bottom-left {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            opacity: 0.18;
        }
        .floral-top-right { top: -30px; right: -30px; width: 350px; height: 350px; }
        .floral-bottom-left { bottom: -40px; left: -40px; width: 400px; height: 400px; transform: rotate(180deg); }

        /* ══════════════════════════════════════════
           MAIN CONTAINER
           ══════════════════════════════════════════ */
        .container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            animation: fadeSlideDown 1s ease-out both;
        }

        .header .subtitle {
            font-family: 'Dancing Script', cursive;
            font-size: 1.3rem;
            color: var(--rose);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .header h1 span { color: var(--rose); font-style: italic; }

        .header .tagline {
            font-size: 1rem;
            color: var(--text-soft);
            font-style: italic;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 28px 0;
            animation: fadeIn 1.2s ease-out 0.3s both;
        }

        .divider-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--rose), transparent);
        }

        .divider-flower { font-size: 1.2rem; opacity: 0.7; }

        /* ── Date, Clock & Éphéméride ── */
        .banner {
            text-align: center;
            margin-bottom: 8px;
            animation: fadeSlideUp 1s ease-out 0.4s both;
        }

        .date-display {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .clock-display {
            font-family: 'Lora', serif;
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: var(--text-soft);
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .ephemeride-display {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1rem, 2.8vw, 1.2rem);
            color: var(--lavande);
        }

        .ephemeride-display::before { content: '✿ '; opacity: 0.6; }
        .ephemeride-display::after  { content: ' ✿'; opacity: 0.6; }

        /* ── Countdown card ── */
        .countdown-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(232, 160, 191, 0.2);
            border-radius: 24px;
            padding: 44px 36px;
            text-align: center;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 8px 32px rgba(195, 174, 214, 0.1), 0 1px 4px rgba(0,0,0,0.03);
            animation: fadeScaleIn 1s ease-out 0.6s both;
            margin-bottom: 12px;
        }

        .countdown-label {
            font-family: 'Dancing Script', cursive;
            font-size: 1.25rem;
            color: var(--rose);
            margin-bottom: 16px;
        }

        .countdown-number {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(4.5rem, 15vw, 8rem);
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1;
            margin-bottom: 8px;
            position: relative;
            display: inline-block;
        }

        .countdown-number::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 10%;
            width: 80%; height: 6px;
            background: linear-gradient(90deg, var(--rose-light), var(--lavande-light), var(--sauge-light));
            border-radius: 3px;
            opacity: 0.6;
        }

        .countdown-unit {
            font-family: 'Lora', serif;
            font-size: 1.15rem;
            color: var(--text-soft);
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        .countdown-details {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.6;
        }

        /* ── Quote ── */
        .daily-quote {
            text-align: center;
            max-width: 520px;
            width: 100%;
            padding: 24px;
            animation: fadeSlideUp 1s ease-out 0.9s both;
        }

        .daily-quote blockquote {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.1rem;
            font-style: italic;
            color: var(--text-soft);
            line-height: 1.7;
            position: relative;
            padding: 0 16px;
        }

        .daily-quote blockquote::before {
            content: '\201C';
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--rose-light);
            position: absolute;
            top: -20px; left: -8px;
            line-height: 1;
        }

        .quote-author {
            margin-top: 12px;
            color: var(--text-light);
            font-family: 'Dancing Script', cursive;
            font-size: 1.05rem;
        }

        /* ── Footer ── */
        .footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            animation: fadeIn 1s ease-out 1.2s both;
        }

        .footer p { font-size: 0.85rem; color: var(--text-light); font-style: italic; }
        .footer .heart { color: var(--rose); display: inline-block; animation: heartbeat 2s ease-in-out infinite; }

        /* ── Celebration ── */
        .celebration .countdown-card {
            background: linear-gradient(135deg, rgba(255,252,249,0.85), rgba(245,213,224,0.5));
            border-color: var(--rose);
        }

        .celebration .celebration-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .celebration .celebration-emoji { font-size: 3rem; margin-bottom: 16px; display: block; }

        .celebration .celebration-message {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            color: var(--text-soft);
            line-height: 1.8;
            max-width: 460px;
            margin: 0 auto;
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* ── Animations ── */
        @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeSlideUp   { from { opacity: 0; transform: translateY(20px); }  to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeScaleIn   { from { opacity: 0; transform: scale(0.95); }       to { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn        { from { opacity: 0; } to { opacity: 1; } }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.25); } 30% { transform: scale(1); } 45% { transform: scale(1.15); } 60% { transform: scale(1); } }
        @keyframes numberPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: petalFall linear forwards;
        }

        @keyframes petalFall {
            0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
            10%  { opacity: 0.7; }
            90%  { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .container { padding: 28px 18px 40px; }
            .countdown-card { padding: 32px 24px; border-radius: 20px; }
            .floral-top-right { width: 200px; height: 200px; top: -15px; right: -15px; }
            .floral-bottom-left { width: 250px; height: 250px; bottom: -20px; left: -20px; }
            .blob { filter: blur(60px); opacity: 0.25; }
            .blob-1 { width: 300px; height: 300px; }
            .blob-2 { width: 250px; height: 250px; }
            .blob-3 { width: 280px; height: 280px; }
            .blob-4 { width: 200px; height: 200px; }
            .splash-flower { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <!-- ══════ SPLASH SCREEN ══════ -->
    <div class="splash-overlay" id="splash-overlay" style="display:none;">
        <div class="splash-petals" id="splash-petals"></div>
        <div class="splash-flower">🌸</div>
        <p class="splash-greeting">Bonjour Béatrice !</p>
        <p class="splash-name" id="splash-title">Bonne journée</p>
        <p class="splash-date" id="splash-date"></p>
        <p class="splash-saint" id="splash-saint"></p>
        <p class="splash-cta">Touche l'écran pour continuer</p>
    </div>

    <!-- ══════ BACKGROUND ══════ -->
    <div class="bg-layer">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <!-- ══════ FLORAL SVG ══════ -->
    <svg class="floral-top-right" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g opacity="0.8">
            <ellipse cx="320" cy="80" rx="60" ry="30" fill="#e8a0bf" transform="rotate(-30 320 80)"/>
            <ellipse cx="320" cy="80" rx="60" ry="30" fill="#e8a0bf" transform="rotate(30 320 80)"/>
            <ellipse cx="320" cy="80" rx="60" ry="30" fill="#d4a96a" transform="rotate(90 320 80)" opacity="0.5"/>
            <circle cx="320" cy="80" r="12" fill="#f5d5e0"/>
            <ellipse cx="370" cy="160" rx="40" ry="20" fill="#c3aed6" transform="rotate(-15 370 160)"/>
            <ellipse cx="370" cy="160" rx="40" ry="20" fill="#c3aed6" transform="rotate(45 370 160)"/>
            <circle cx="370" cy="160" r="8" fill="#e0d4f0"/>
            <ellipse cx="280" cy="40" rx="35" ry="15" fill="#a8c5a0" transform="rotate(-45 280 40)"/>
            <ellipse cx="280" cy="40" rx="35" ry="15" fill="#a8c5a0" transform="rotate(15 280 40)"/>
            <circle cx="280" cy="40" r="7" fill="#d4e6cf"/>
            <path d="M320 95 C310 140, 280 180, 260 220" stroke="#a8c5a0" stroke-width="2" fill="none" opacity="0.6"/>
            <path d="M370 175 C360 210, 340 230, 310 260" stroke="#a8c5a0" stroke-width="1.5" fill="none" opacity="0.5"/>
        </g>
    </svg>

    <svg class="floral-bottom-left" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g opacity="0.8">
            <ellipse cx="320" cy="80" rx="60" ry="30" fill="#c3aed6" transform="rotate(-30 320 80)"/>
            <ellipse cx="320" cy="80" rx="60" ry="30" fill="#c3aed6" transform="rotate(30 320 80)"/>
            <ellipse cx="320" cy="80" rx="60" ry="30" fill="#e8a0bf" transform="rotate(90 320 80)" opacity="0.5"/>
            <circle cx="320" cy="80" r="12" fill="#e0d4f0"/>
            <ellipse cx="370" cy="160" rx="40" ry="20" fill="#a8c5a0" transform="rotate(-15 370 160)"/>
            <ellipse cx="370" cy="160" rx="40" ry="20" fill="#a8c5a0" transform="rotate(45 370 160)"/>
            <circle cx="370" cy="160" r="8" fill="#d4e6cf"/>
            <path d="M320 95 C310 140, 290 170, 270 210" stroke="#c3aed6" stroke-width="2" fill="none" opacity="0.5"/>
            <path d="M370 175 C365 200, 350 230, 320 260" stroke="#a8c5a0" stroke-width="1.5" fill="none" opacity="0.4"/>
        </g>
    </svg>

    <canvas id="confetti-canvas"></canvas>

    <!-- ══════ MAIN CONTENT ══════ -->
    <div class="container" id="main-container">

        <header class="header">
            <p class="subtitle">Le Compte à Rebours de</p>
            <h1>Béatrice, <span>bientôt libre !</span></h1>
            <p class="tagline">Un nouveau chapitre s'ouvre… et il s'annonce merveilleux.</p>
        </header>

        <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-flower">✿</span>
            <span class="divider-line"></span>
        </div>

        <div class="banner">
            <div class="date-display" id="date-display"></div>
            <div class="clock-display" id="clock-display"></div>
            <div class="ephemeride-display" id="ephemeride-display"></div>
        </div>

        <div class="countdown-card" id="countdown-card">
            <p class="countdown-label">Jours ouvrés avant la liberté</p>
            <div class="countdown-number" id="countdown-number">–</div>
            <p class="countdown-unit" id="countdown-unit">jours ouvrés restants</p>
            <p class="countdown-details" id="countdown-details"></p>
        </div>

        <div class="daily-quote" id="daily-quote">
            <blockquote id="quote-text"></blockquote>
            <p class="quote-author" id="quote-author"></p>
        </div>

        <footer class="footer">
            <p>Fait avec <span class="heart">♥</span> par ses collègues du CRC Pro-TPE</p>
        </footer>
    </div>

    <script>
        // ════════════════════════════════════════
        //  CONFIGURATION
        // ════════════════════════════════════════

        const RETIREMENT_DATE = new Date(2026, 4, 1); // 1er mai 2026

        const JOURS_FERIES = [
            '2026-04-06', // Lundi de Pâques
            '2026-05-01', // Fête du travail
        ];

        // ════════════════════════════════════════
        //  SAINTS DU JOUR (avril + début mai)
        // ════════════════════════════════════════

        const SAINTS = {
            '04-01': 'Sainte Valéry',
            '04-02': 'Sainte Sandrine',
            '04-03': 'Saint Richard',
            '04-04': 'Saint Isidore',
            '04-05': 'Sainte Irène',
            '04-06': 'Saint Marcellin',
            '04-07': 'Saint Jean-Baptiste de la Salle',
            '04-08': 'Sainte Julie',
            '04-09': 'Saint Gautier',
            '04-10': 'Saint Fulbert',
            '04-11': 'Saint Stanislas',
            '04-12': 'Saint Jules',
            '04-13': 'Sainte Ida',
            '04-14': 'Saint Maxime',
            '04-15': 'Saint Paterne',
            '04-16': 'Saint Benoît-Joseph',
            '04-17': 'Saint Anicet',
            '04-18': 'Saint Parfait',
            '04-19': 'Sainte Emma',
            '04-20': 'Sainte Odette',
            '04-21': 'Saint Anselme',
            '04-22': 'Saint Alexandre',
            '04-23': 'Saint Georges',
            '04-24': 'Saint Fidèle',
            '04-25': 'Saint Marc',
            '04-26': 'Sainte Alida',
            '04-27': 'Sainte Zita',
            '04-28': 'Sainte Valérie',
            '04-29': 'Sainte Catherine de Sienne',
            '04-30': 'Saint Robert',
            '05-01': 'Saint Jérémie',
            '05-02': 'Saint Boris',
            '05-03': 'Saints Philippe et Jacques',
        };

        function getSaintDuJour(date) {
            const key = String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
            return SAINTS[key] || null;
        }

        // ════════════════════════════════════════
        //  CITATIONS
        // ════════════════════════════════════════

        const QUOTES = [
            { text: "La retraite, c'est quand on arrête de gagner sa vie et qu'on commence à la vivre.", author: "Anonyme" },
            { text: "Le plus beau voyage est celui qui reste à faire.", author: "Loïck Peyron" },
            { text: "Chaque matin est une invitation à se réjouir d'un jour nouveau.", author: "Sagesse populaire" },
            { text: "La vie commence là où finit la zone de confort.", author: "Neale Donald Walsch" },
            { text: "Le bonheur n'est pas une destination, c'est une façon de voyager.", author: "Margaret Lee Runbeck" },
            { text: "Devant soi, il n'y a que des possibilités.", author: "Proverbe" },
            { text: "Prends le temps de savourer les petits bonheurs, ce sont eux les grands.", author: "Sagesse du cœur" },
            { text: "La liberté, c'est le matin. Chaque matin.", author: "Paul Valéry" },
            { text: "Il n'y a pas d'âge pour rêver d'un nouveau départ.", author: "Anonyme" },
            { text: "Le temps que l'on prend est le temps qui nous reste.", author: "Proverbe français" },
            { text: "L'avenir appartient à ceux qui croient à la beauté de leurs rêves.", author: "Eleanor Roosevelt" },
            { text: "Vivre est la chose la plus rare au monde. La plupart des gens se contentent d'exister.", author: "Oscar Wilde" },
            { text: "Le secret du bonheur est la liberté, et le secret de la liberté est le courage.", author: "Thucydide" },
            { text: "Un sourire coûte moins cher que l'électricité, mais il donne autant de lumière.", author: "Abbé Pierre" },
            { text: "Rien ne vaut la paix d'un matin sans réveil.", author: "Tout futur retraité" },
            { text: "Les plus belles choses de la vie ne sont pas des choses.", author: "Anonyme" },
            { text: "Il faut toujours garder un coin de folie dans la sagesse.", author: "Proverbe oriental" },
            { text: "Tout commence par un rêve.", author: "Walt Disney" },
            { text: "La vraie richesse, c'est le temps.", author: "Anonyme" },
            { text: "Profiter de chaque instant, voilà la plus belle retraite.", author: "Sagesse populaire" },
            { text: "Chaque jour est un bon jour.", author: "Proverbe zen" },
            { text: "La joie est en tout, il faut savoir l'extraire.", author: "Confucius" },
            { text: "Fais de ta vie un rêve, et d'un rêve, une réalité.", author: "Antoine de Saint-Exupéry" },
        ];

        // ════════════════════════════════════════
        //  SPLASH SCREEN (1× par jour)
        // ════════════════════════════════════════

        function getTodayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function shouldShowSplash() {
            try {
                return localStorage.getItem('bea-last-splash') !== getTodayKey();
            } catch (e) {
                return true;
            }
        }

        function markSplashShown() {
            try { localStorage.setItem('bea-last-splash', getTodayKey()); } catch (e) {}
        }

        function initSplash() {
            if (!shouldShowSplash()) return;

            const overlay = document.getElementById('splash-overlay');
            overlay.style.display = 'flex';

            const now = new Date();

            // Date
            document.getElementById('splash-date').textContent =
                `${JOURS_SEMAINE[now.getDay()]} ${now.getDate()} ${MOIS_ANNEE[now.getMonth()]} ${now.getFullYear()}`;

            // Saint du jour
            const saint = getSaintDuJour(now);
            if (saint) {
                document.getElementById('splash-saint').textContent = `Nous fêtons les ${saint.replace(/^Sainte?\s/, '')} — ${saint}`;
            }

            // Message contextuel
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const target = new Date(RETIREMENT_DATE); target.setHours(0,0,0,0);
            const joursRestants = countJoursOuvres(today, target);

            let title = 'Bonne journée !';
            if (today >= target)       title = 'Bonne retraite, Béa !';
            else if (joursRestants <= 1) title = 'Dernier jour… profite bien !';
            else if (joursRestants <= 3) title = 'C\'est presque fini !';
            else if (joursRestants <= 5) title = 'La liberté approche !';
            else if (joursRestants <= 10) title = 'Plus que quelques jours…';
            document.getElementById('splash-title').textContent = title;

            // Pétales décoratifs
            const petalsContainer = document.getElementById('splash-petals');
            const petalChars = ['🌸','🩷','✿','❀','🌷','💮','🌺'];
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('span');
                p.className = 'splash-petal-item';
                p.textContent = petalChars[Math.floor(Math.random() * petalChars.length)];
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = (Math.random() * 3 + 0.5) + 's';
                p.style.animationDuration = (Math.random() * 3 + 4) + 's';
                petalsContainer.appendChild(p);
            }

            // Fermer au clic / touche / auto après 8s
            overlay.addEventListener('click', closeSplash);
            overlay.addEventListener('touchstart', closeSplash, { passive: true });
            setTimeout(closeSplash, 8000);
        }

        function closeSplash() {
            const overlay = document.getElementById('splash-overlay');
            if (overlay.classList.contains('fade-out')) return;
            overlay.classList.add('fade-out');
            markSplashShown();
            setTimeout(() => { overlay.style.display = 'none'; }, 800);
        }

        // ════════════════════════════════════════
        //  JOURS OUVRÉS
        // ════════════════════════════════════════

        function formatDateKey(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function isJourOuvre(d) {
            const dow = d.getDay();
            if (dow === 0 || dow === 6) return false;
            return !JOURS_FERIES.includes(formatDateKey(d));
        }

        function countJoursOuvres(from, to) {
            let count = 0;
            let current = new Date(from); current.setHours(0,0,0,0);
            const end = new Date(to); end.setHours(0,0,0,0);
            current.setDate(current.getDate() + 1);
            while (current < end) {
                if (isJourOuvre(current)) count++;
                current.setDate(current.getDate() + 1);
            }
            return count;
        }

        // ════════════════════════════════════════
        //  DATE, HORLOGE & ÉPHÉMÉRIDE
        // ════════════════════════════════════════

        const JOURS_SEMAINE = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
        const MOIS_ANNEE = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

        function updateDateTime() {
            const now = new Date();
            document.getElementById('date-display').textContent =
                `${JOURS_SEMAINE[now.getDay()]} ${now.getDate()} ${MOIS_ANNEE[now.getMonth()]} ${now.getFullYear()}`;
            const h = String(now.getHours()).padStart(2,'0');
            const m = String(now.getMinutes()).padStart(2,'0');
            const s = String(now.getSeconds()).padStart(2,'0');
            document.getElementById('clock-display').textContent = `${h} h ${m} : ${s}`;
        }

        function updateEphemeride() {
            const saint = getSaintDuJour(new Date());
            const el = document.getElementById('ephemeride-display');
            el.textContent = saint ? saint : '';
            if (!saint) el.style.display = 'none';
        }

        // ════════════════════════════════════════
        //  COUNTDOWN
        // ════════════════════════════════════════

        function updateCountdown() {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const target = new Date(RETIREMENT_DATE); target.setHours(0,0,0,0);

            if (today >= target) { showCelebration(); return; }

            const joursOuvres = countJoursOuvres(today, target);
            document.getElementById('countdown-number').textContent = joursOuvres;
            document.getElementById('countdown-unit').textContent =
                joursOuvres <= 1 ? 'jour ouvré restant' : 'jours ouvrés restants';

            const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            document.getElementById('countdown-details').textContent =
                `soit ${diffDays} jour${diffDays > 1 ? 's' : ''} calendaire${diffDays > 1 ? 's' : ''} avant le 1ᵉʳ mai 2026`;

            if (joursOuvres <= 5) {
                const el = document.getElementById('countdown-number');
                el.style.animation = 'numberPulse 2s ease-in-out infinite';
                el.style.color = 'var(--rose)';
            }
        }

        // ════════════════════════════════════════
        //  CELEBRATION (JOUR J)
        // ════════════════════════════════════════

        function showCelebration() {
            document.getElementById('main-container').classList.add('celebration');
            document.getElementById('countdown-card').innerHTML = `
                <span class="celebration-emoji">🎉🌸🥂</span>
                <h2 class="celebration-title">Béatrice,<br>c'est aujourd'hui !</h2>
                <p class="celebration-message">
                    Le grand jour est arrivé. Après toutes ces années de dévouement, 
                    de sourires et de bienveillance, une nouvelle aventure commence pour toi.<br><br>
                    <strong>Merci pour tout, Béa.</strong><br>
                    Tu vas terriblement nous manquer. 💐
                </p>`;
            document.querySelector('.header h1').innerHTML = 'Béatrice, <span>te voilà libre !</span>';
            document.querySelector('.header .tagline').textContent = 'Bonne retraite, Béa ! On t\'aime.';
            launchConfetti();
        }

        // ════════════════════════════════════════
        //  CONFETTI
        // ════════════════════════════════════════

        function launchConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const COLORS = ['#e8a0bf','#c3aed6','#a8c5a0','#d4a96a','#f5d5e0','#e0d4f0','#d4e6cf','#FFD700'];
            const pieces = [];
            for (let i = 0; i < 150; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 3,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    vx: (Math.random() - 0.5) * 3,
                    vy: Math.random() * 3 + 1.5,
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 8,
                    shape: Math.random() > 0.5 ? 'circle' : 'rect',
                    opacity: 1
                });
            }
            let frame = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                frame++;
                pieces.forEach(p => {
                    p.x += p.vx + Math.sin(frame * 0.02 + p.r) * 0.5;
                    p.y += p.vy;
                    p.rot += p.rotSpeed;
                    if (frame > 200) p.opacity -= 0.005;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.globalAlpha = Math.max(0, p.opacity);
                    ctx.fillStyle = p.color;
                    if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
                    else { ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r); }
                    ctx.restore();
                });
                if (frame < 400 && pieces.some(p => p.opacity > 0)) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            animate();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        }

        // ════════════════════════════════════════
        //  CITATION DU JOUR
        // ════════════════════════════════════════

        function showDailyQuote() {
            const now = new Date();
            const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            const quote = QUOTES[dayOfYear % QUOTES.length];
            document.getElementById('quote-text').textContent = quote.text;
            document.getElementById('quote-author').textContent = '— ' + quote.author;
        }

        // ════════════════════════════════════════
        //  PÉTALES
        // ════════════════════════════════════════

        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerHTML = ['🌸','🩷','✿','❀','🌷','💮'][Math.floor(Math.random() * 6)];
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.fontSize = (Math.random() * 14 + 10) + 'px';
            petal.style.animationDuration = (Math.random() * 6 + 8) + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 15000);
        }

        // ════════════════════════════════════════
        //  INIT
        // ════════════════════════════════════════

        updateDateTime();
        updateCountdown();
        updateEphemeride();
        showDailyQuote();
        initSplash();

        setInterval(updateDateTime, 1000);
        setInterval(updateCountdown, 60000);
        setInterval(createPetal, 4000);
        setTimeout(createPetal, 2000);
        setTimeout(createPetal, 3000);
    </script>
</body>
